name: Scrape LinkedIn leads

on:
  schedule:
    # Runs every 2 hours (matches ROTATION_SLOT_HOURS in the script — keep
    # these in sync). Safe at this frequency because check-lead.js skips
    # already-saved posts for free, and each run only queries a rotating
    # slice of categories (CATEGORIES_PER_RUN) to stay under the CSE daily
    # quota: 3 categories x 2 phrases x 12 runs/day = 72 queries/day.
    - cron: '0 */2 * * *'
  workflow_dispatch: {} # allows manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        env:
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/scrape-and-filter.mjs
