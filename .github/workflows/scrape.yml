name: Scrape LinkedIn leads

on:
  schedule:
    # Runs every 6 hours. Safe to run this often because check-lead.js skips
    # already-saved posts before spending any AI classification quota on them.
    - cron: '0 */6 * * *'
  workflow_dispatch: {} # allows manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        env:
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/scrape-and-filter.mjs
